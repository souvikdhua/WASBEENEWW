<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasabee Menu Widget</title>
  
  <!-- Modern clean typography from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* === DESIGN SYSTEM VARIABLES === */
    :root {
      /* Reverted Brand Colors (Plum & Cream) */
      --color-brand: #82066A;
      --color-brand-light: #a31085;
      --color-brand-dark: #5a0449;
      --color-bg: #FAF7F2;
      --color-bg-alt: #F2EFE8;
      --color-surface: #ffffff;
      --color-border: rgba(130, 6, 106, 0.12);
      
      /* Typography */
      --color-text: #2A2426;
      --color-text-muted: #5e5559;
      --font-body: 'Inter', sans-serif;
      
      /* WhatsApp Green */
      --color-whatsapp: #25D366;
      --color-whatsapp-hover: #128C7E;
      
      /* Shadow & Radius */
      --radius-card: 12px;
      --shadow-premium: 0 4px 20px rgba(130, 6, 106, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* === RESET & BASE === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      padding: 2rem 1.5rem;
    }

    /* === WIDGET HEADER === */
    .widget-header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    .widget-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-brand);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .widget-subtitle {
      font-size: 1rem;
      color: var(--color-text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* === SEARCH & FILTERS === */
    .widget-controls {
      max-width: 1200px;
      margin: 0 auto 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    .search-input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 1px solid var(--color-border);
      border-radius: 30px;
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-premium);
    }

    .search-input:focus {
      border-color: var(--color-brand);
      box-shadow: 0 4px 20px rgba(123, 34, 82, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--color-text-muted);
      pointer-events: none;
    }

    .category-tabs {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      max-width: 100%;
      padding: 0.5rem 0.2rem;
      scrollbar-width: none; /* Hide scrollbar Firefox */
    }

    .category-tabs::-webkit-scrollbar {
      display: none; /* Hide scrollbar Chrome/Safari */
    }

    .cat-btn {
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition-smooth);
      font-family: var(--font-body);
    }

    .cat-btn:hover {
      border-color: var(--color-brand-light);
      color: var(--color-brand);
    }

    .cat-btn.active {
      background-color: var(--color-brand);
      border-color: var(--color-brand);
      color: var(--color-bg);
      box-shadow: 0 4px 12px rgba(123, 34, 82, 0.25);
    }

    /* === MENU GRID === */
    .menu-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      transition: var(--transition-smooth);
    }

    /* === MENU CARD === */
    .menu-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-premium);
      transition: var(--transition-smooth);
    }

    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--color-brand-light);
      box-shadow: 0 12px 30px rgba(123, 34, 82, 0.08);
    }

    .card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }

    /* Diet Icon (Veg / Non-Veg Indicator) */
    .diet-indicator {
      width: 14px;
      height: 14px;
      border: 1px solid #ccc;
      padding: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .diet-indicator.veg {
      border-color: #2e7d32;
    }

    .diet-indicator.veg::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2e7d32;
    }

    .diet-indicator.non-veg {
      border-color: #c62828;
    }

    .diet-indicator.non-veg::before {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-left: 4.5px solid transparent;
      border-right: 4.5px solid transparent;
      border-bottom: 7.8px solid #c62828;
    }

    .card-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--color-brand);
      letter-spacing: 0.08em;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 0.4rem;
    }

    .card-description {
      font-size: 0.88rem;
      color: var(--color-text-muted);
      margin-bottom: 1.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price-action {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: auto;
    }

    .card-price {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-brand);
    }

    /* WhatsApp Button styling (Unified to match site CTAs) */
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: var(--color-brand);
      color: #FAF7F2;
      padding: 0.6rem 1.1rem;
      border-radius: 24px 4px; /* Asymmetric leaf shape */
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.4s ease;
      border: 1px solid var(--color-brand);
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(130, 6, 106, 0.15);
    }

    .btn-whatsapp:hover {
      background-color: #FAF7F2;
      color: var(--color-brand);
      box-shadow: 0 6px 15px rgba(130, 6, 106, 0.25);
      transform: translateY(-2px);
    }

    .btn-whatsapp svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* === RESPONSIVE LAYOUT (1 Column on Mobile) === */
    @media (max-width: 768px) {
      body {
        padding: 1.5rem 1rem;
      }
      
      .widget-title {
        font-size: 1.7rem;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }

      .menu-card {
        padding: 1.2rem;
        gap: 1rem;
      }
      
      .card-title {
        font-size: 1.05rem;
      }
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--color-text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <!-- Widget Title Bar -->
  <header class="widget-header">
    <h1 class="widget-title">Wasabee Menu</h1>
    <p class="widget-subtitle">Browse our authentic Japanese, Korean & Pan-Asian flavors. Click any item to order instantly via WhatsApp.</p>
  </header>

  <!-- Filter Controls -->
  <section class="widget-controls">
    <!-- Search Bar -->
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" class="search-input" id="widget-search" placeholder="Search dish or ingredient...">
    </div>

    <!-- Category Filter Tabs -->
    <div class="category-tabs" id="widget-tabs">
      <button class="cat-btn active" data-category="all">All Dishes</button>
      <button class="cat-btn" data-category="dumplings">Dumplings</button>
      <button class="cat-btn" data-category="sushi">Japanese Sushi</button>
      <button class="cat-btn" data-category="korean-sushi">Korean Sushi</button>
      <button class="cat-btn" data-category="korean">Korean Mains</button>
      <button class="cat-btn" data-category="japanese">Japanese Classics</button>
      <button class="cat-btn" data-category="pan-asian">Pan-Asian</button>
      <button class="cat-btn" data-category="desserts">Desserts</button>
    </div>
  </section>

  <!-- Menu Cards List -->
  <main class="menu-grid" id="widget-grid">
    <!-- Rendered dynamically by JavaScript -->
  </main>

  <script>
    // =========================================================================
    // CONFIGURATION DETAILS:
    // 1. WHATSAPP_PHONE_NUMBER: Swap out with your business phone number.
    //    Include the country code but do not use '+' or spaces (e.g. 919163764444).
    // 2. menuItems JSON array: Add, modify or remove items.
    // =========================================================================
    
    // <!-- SWAP_YOUR_PHONE_NUMBER_HERE -->
    const WHATSAPP_PHONE_NUMBER = "919163764444"; 

    // <!-- CONFIG_MENU_ITEMS_ARRAY_HERE -->
    const menuItems = [
      {
        id: 1,
        name: "Gyoza Veg",
        description: "Traditional Japanese dumplings, steamed or pan-fried, served with spicy dip",
        price: 275,
        category: "dumplings",
        isVeg: true
      },
      {
        id: 2,
        name: "Gyoza Non-Veg",
        description: "Traditional meat dumplings, steamed or pan-fried, served with spicy dip",
        price: 325,
        category: "dumplings",
        isVeg: false
      },
      {
        id: 3,
        name: "Shoyu Gyoza Veg",
        description: "Steamed vegetable dumplings served in a flavorful soy broth",
        price: 275,
        category: "dumplings",
        isVeg: true
      },
      {
        id: 4,
        name: "Veg Gimbap",
        description: "Korean sushi rolls filled with fresh avocado, cream cheese, cucumber, and carrot",
        price: 575,
        category: "korean-sushi",
        isVeg: true
      },
      {
        id: 5,
        name: "California Uramaki 8pc",
        description: "Classic Japanese inside-out rolls filled with cucumber, creamy avocado, and crabstick",
        price: 775,
        category: "sushi",
        isVeg: false
      },
      {
        id: 6,
        name: "Chicken Teriyaki Uramaki 8pc",
        description: "Sushi rolls glazed in house sweet soy, mirin, and teriyaki chicken slices",
        price: 575,
        category: "sushi",
        isVeg: false
      },
      {
        id: 7,
        name: "Jajangmyeon",
        description: "Thick Korean wheat noodles tossed in a rich, savory black bean sauce with tender pork",
        price: 445,
        category: "korean",
        isVeg: false
      },
      {
        id: 8,
        name: "Tonkotsu Ramen",
        description: "Noodle soup topped with tender pork slices, soft boiled egg, and crispy nori seaweed",
        price: 375,
        category: "japanese",
        isVeg: false
      },
      {
        id: 9,
        name: "Pad Thai Veg",
        description: "Traditional stir-fried rice noodles tossed with crunchy peanuts and fresh sprouts",
        price: 195,
        category: "pan-asian",
        isVeg: true
      },
      {
        id: 10,
        name: "Caramel Pudding",
        description: "Silky Japanese-style custard with a rich, bittersweet caramel glaze",
        price: 125,
        category: "desserts",
        isVeg: true
      }
    ];

    // === WIDGET LOGIC ===
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('widget-search');
      const tabs = document.querySelectorAll('.cat-btn');
      const grid = document.getElementById('widget-grid');

      // WhatsApp SVG icon path
      const whatsappIcon = `
        <svg viewBox="0 0 24 24">
          <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.005-5.074 4.141-9.211 9.219-9.211 2.461.002 4.776.96 6.516 2.7 1.739 1.74 2.697 4.053 2.695 6.513-.005 5.076-4.142 9.21-9.218 9.213z"/>
        </svg>
      `;

      // Render cards to grid
      function renderMenu(items) {
        grid.innerHTML = '';
        
        if (items.length === 0) {
          grid.innerHTML = '<div class="empty-state">No dishes match your search or filters.</div>';
          return;
        }

        items.forEach(item => {
          // Construct custom URL-encoded WhatsApp text message
          // <!-- SWAP_ITEM_LINKS_HERE -->
          const rawMessage = `Hi Wasabee! I would like to order the following item:\n\n*${item.name}* - ₹${item.price}\n\nPlease confirm my order.`;
          const encodedMessage = encodeURIComponent(rawMessage);
          const whatsappUrl = `https://wa.me/${WHATSAPP_PHONE_NUMBER}?text=${encodedMessage}`;

          const card = document.createElement('div');
          card.className = 'menu-card';
          card.innerHTML = `
            <div class="card-info">
              <div>
                <div class="card-meta">
                  <span class="diet-indicator ${item.isVeg ? 'veg' : 'non-veg'}" aria-label="${item.isVeg ? 'Veg' : 'Non-Veg'}"></span>
                  <span class="card-category">${item.category.replace('-', ' ')}</span>
                </div>
                <h3 class="card-title">${item.name}</h3>
                <p class="card-description">${item.description}</p>
              </div>
              <div class="card-price-action">
                <span class="card-price">₹${item.price}</span>
                <a href="${whatsappUrl}" target="_blank" class="btn-whatsapp" aria-label="Order ${item.name} on WhatsApp">
                  ${whatsappIcon}
                  <span>Order</span>
                </a>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      // Filter and Search Engine
      function filterMenu() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const activeCategory = document.querySelector('.cat-btn.active').getAttribute('data-category');

        const filtered = menuItems.filter(item => {
          const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                                item.description.toLowerCase().includes(searchTerm);
          const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
          
          return matchesSearch && matchesCategory;
        });

        renderMenu(filtered);
      }

      // Tab filtering clicks
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          filterMenu();
          
          // Smoothly scroll active tab into view on mobile
          tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });
      });

      // Search typing
      if (searchInput) {
        searchInput.addEventListener('input', filterMenu);
      }

      // Initial Render
      renderMenu(menuItems);
    });
  </script>

</body>
</html>
